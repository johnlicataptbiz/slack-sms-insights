<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PT Biz SMS Asset Kit Preview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <img class="hero-art" src="assets/sms_growth_hero.png" alt="SMS growth hero">
    <div class="hero-copy">
      <img class="logo" src="assets/ptbiz_sms_logo_badge.png" alt="PT Biz SMS">
      <h1>PT Biz SMS asset kit</h1>
      <p>Starter pack for product pages, hero sections, dividers, and branded visual modules.</p>
    </div>
  </header>

  <section class="section">
    <h2>Patterns</h2>
    <div class="grid two">
      <img src="assets/ptbiz_sms_pattern.png" alt="Pattern 1">
      <img src="assets/sms_network_pattern.png" alt="Pattern 2">
    </div>
  </section>

  <section class="section">
    <h2>Banners</h2>
    <div class="grid one">
      <img src="assets/sms_growth_banner.png" alt="Banner 1">
      <img src="assets/sms_wave_banner.png" alt="Banner 2">
      <img src="assets/analytics_wave_banner.png" alt="Banner 3">
    </div>
  </section>

  <section class="section">
    <h2>Dividers</h2>
    <div class="grid one">
      <img src="assets/wave_sms_divider.png" alt="Divider 1">
      <img src="assets/network_bar_divider.png" alt="Divider 2">
      <img src="assets/node_bar_divider.png" alt="Divider 3">
      <img src="assets/arrow_strip_divider.png" alt="Divider 4">
    </div>
  </section>
</body>
</html>
